<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#b1ba8a",
                        "error-container": "#93000a",
                        "on-primary-fixed-variant": "#474836",
                        "surface-container-highest": "#34362d",
                        "on-surface": "#e3e3d6",
                        "primary": "#c8c8b0",
                        "tertiary-fixed-dim": "#f0bd8b",
                        "on-primary-container": "#e2e3ca",
                        "primary-fixed-dim": "#c8c8b0",
                        "surface": "#12140d",
                        "on-tertiary-container": "#ffdab8",
                        "primary-fixed": "#e4e4cc",
                        "inverse-on-surface": "#2f3128",
                        "outline": "#8f9284",
                        "on-surface-variant": "#c5c8b8",
                        "surface-container-high": "#292b22",
                        "secondary-fixed": "#dee8b4",
                        "secondary": "#c2cb9a",
                        "surface-variant": "#34362d",
                        "error": "#ffb4ab",
                        "background": "#12140d",
                        "on-tertiary": "#482904",
                        "inverse-primary": "#5e604d",
                        "surface-tint": "#c8c8b0",
                        "outline-variant": "#45483c",
                        "on-secondary-fixed": "#171e01",
                        "secondary-container": "#424a24",
                        "tertiary": "#f0bd8b",
                        "surface-container-low": "#1a1c14",
                        "surface-bright": "#383a31",
                        "on-tertiary-fixed-variant": "#623f18",
                        "on-secondary": "#2c3410",
                        "surface-dim": "#12140d",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdcbd",
                        "on-secondary-fixed-variant": "#424a24",
                        "primary-container": "#646552",
                        "surface-container": "#1e2018",
                        "on-tertiary-fixed": "#2c1600",
                        "surface-container-lowest": "#0d0f08",
                        "secondary-fixed-dim": "#c2cb9a",
                        "on-primary": "#303221",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#835b31",
                        "inverse-surface": "#e3e3d6",
                        "on-background": "#e3e3d6",
                        "on-primary-fixed": "#1b1d0e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .staggered-reveal > * {
            animation: fadeIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-tertiary/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#12140d]/80 backdrop-blur-md">
<nav class="flex justify-between items-center px-8 py-6 w-full max-w-7xl mx-auto">
<div class="font-newsreader italic text-2xl text-[#e3e3d6] tracking-tight">Talinghaga</div>
<div class="hidden md:flex items-center gap-10">
<a class="font-manrope uppercase tracking-widest text-xs text-[#c8c8b0]/60 hover:text-[#e3e3d6] transition-colors duration-300" href="#">Archive</a>
<a class="font-manrope uppercase tracking-widest text-xs text-[#c8c8b0]/60 hover:text-[#e3e3d6] transition-colors duration-300" href="#">Privacy</a>
<button class="text-[#c8c8b0] hover:text-[#e3e3d6] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
<!-- Mobile Menu Icon (Visual Only) -->
<div class="md:hidden">
<span class="material-symbols-outlined text-[#c8c8b0]">menu</span>
</div>
</nav>
</header>
<main class="min-h-screen pt-32 pb-24 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Ambiance -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-tertiary/5 rounded-full blur-[100px]"></div>
</div>
<!-- Submission Content -->
<div class="relative z-10 w-full max-w-2xl px-6 flex flex-col items-center text-center staggered-reveal">
<div class="mb-12">
<h1 class="font-headline italic text-4xl md:text-5xl text-on-surface mb-4 leading-tight">Offer a Whisper</h1>
<p class="font-body text-on-surface-variant font-light text-lg tracking-wide max-w-md mx-auto">
                    What is the weight you carry today? Type your whisper here.
                </p>
</div>
<div class="w-full relative group">
<!-- Text Area - Minimalist, No box, Ghost bottom border -->
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant/30 focus:border-primary focus:ring-0 text-2xl md:text-3xl font-headline italic placeholder:text-on-surface/10 py-8 resize-none min-h-[300px] transition-all duration-700 leading-relaxed text-on-surface" placeholder="In the quiet of this space..." spellcheck="false"></textarea>
<div class="mt-12 flex flex-col items-center gap-6">
<!-- Sealing Button -->
<button class="group relative px-10 py-4 bg-primary text-on-primary rounded-md overflow-hidden transition-all duration-500 hover:bg-primary-fixed-dim">
<span class="relative z-10 font-label uppercase tracking-[0.2em] text-xs font-bold flex items-center gap-3">
                            Submit Anonymously
                            <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
</span>
<div class="absolute inset-0 bg-gradient-to-r from-primary via-primary-container to-primary opacity-0 group-hover:opacity-20 transition-opacity duration-500"></div>
</button>
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant/40 flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">encrypted</span>
                        Your words will be dissolved into the archive. No traces remain.
                    </p>
</div>
</div>
</div>
<!-- Floating Decorative Element (Abstract Scroll) -->
<div class="absolute right-12 bottom-1/4 opacity-10 hidden lg:block select-none">
<div class="w-px h-64 bg-gradient-to-b from-transparent via-on-surface to-transparent"></div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-12 bg-[#12140d] flex flex-col items-center gap-4 text-center">
<div class="flex gap-8 mb-4">
<a class="font-manrope text-[10px] tracking-widest uppercase text-[#c8c8b0]/50 hover:text-[#e3e3d6] transition-colors" href="#">The Veil</a>
<a class="font-manrope text-[10px] tracking-widest uppercase text-[#c8c8b0]/50 hover:text-[#e3e3d6] transition-colors" href="#">Archive Protocol</a>
<a class="font-manrope text-[10px] tracking-widest uppercase text-[#c8c8b0]/50 hover:text-[#e3e3d6] transition-colors" href="#">Anonymity</a>
</div>
<p class="font-manrope text-[10px] tracking-widest uppercase text-[#c8c8b0]/50">
            © Talinghaga. Whispers encrypted in perpetuity.
        </p>
</footer>
<!-- Texture Overlay -->
<div class="fixed inset-0 pointer-events-none z-[100] opacity-[0.03] mix-blend-overlay">
<div class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/pinstriped-suit.png')]"></div>
</div>
</body></html>
